<svg width="440" height="360" viewBox="0 0 440 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ready-to-Launch Banking embedded app illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6B54FF"/>
      <stop offset="1" stop-color="#3A1FB0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#21D07A"/>
      <stop offset="1" stop-color="#0FA15C"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1A1147" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="20" y="14" width="400" height="332" rx="28" fill="url(#bg)"/>

  <!-- floating browser frame -->
  <g filter="url(#sh)">
    <rect x="62" y="58" width="232" height="250" rx="18" fill="#0E1024"/>
    <rect x="62" y="58" width="232" height="34" rx="18" fill="#1A1D38"/>
    <rect x="62" y="80" width="232" height="12" fill="#1A1D38"/>
    <circle cx="80" cy="75" r="4" fill="#FF5F57"/>
    <circle cx="94" cy="75" r="4" fill="#FEBC2E"/>
    <circle cx="108" cy="75" r="4" fill="#28C840"/>
    <rect x="132" y="69" width="146" height="12" rx="6" fill="#2A2E50"/>

    <!-- account balance -->
    <text x="82" y="124" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#9AA0C2">Available balance</text>
    <text x="82" y="150" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">$12,480.00</text>

    <!-- mini card -->
    <rect x="82" y="166" width="120" height="74" rx="11" fill="url(#card)"/>
    <rect x="94" y="180" width="22" height="16" rx="3" fill="#0E1024" opacity="0.35"/>
    <text x="94" y="226" font-family="ui-monospace, monospace" font-size="10" fill="#0E1024" opacity="0.8">•••• 4242</text>

    <!-- transaction rows -->
    <g>
      <rect x="82" y="254" width="190" height="14" rx="4" fill="#1C2040"/>
      <rect x="82" y="276" width="160" height="14" rx="4" fill="#1C2040"/>
    </g>
  </g>

  <!-- code snippet card -->
  <g filter="url(#sh)">
    <rect x="246" y="120" width="160" height="120" rx="14" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <rect x="262" y="140" width="128" height="9" rx="4" fill="#A99CFF"/>
    <rect x="262" y="158" width="96" height="9" rx="4" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="262" y="176" width="112" height="9" rx="4" fill="#21D07A"/>
    <rect x="262" y="194" width="74" height="9" rx="4" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="262" y="212" width="104" height="9" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
  </g>

  <circle cx="372" cy="92" r="14" fill="#21D07A"/>
  <path d="M366 92l4 4 8-8" stroke="#0E1024" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
